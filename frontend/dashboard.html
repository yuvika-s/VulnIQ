<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Never let the browser serve a stale build of this dashboard — it must always
     pick up the latest JS so the live-data refresh logic is current. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>VulnIQ — Attack-Chain Prioritization Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b; --bg2:#111114; --panel:#141419; --panel2:#1b1b21;
  --line:#26262e; --line2:#363641;
  --yellow:#f5e000; --yellow-dim:#bdab00;
  --blue:#2f6bff; --blue-bright:#5b8cff;
  --text:#f3f3f5; --muted:#8a8a94; --muted2:#5c5c66;
  --crit:#ff3b4e; --week:#ff8c1a; --month:#ffc93c; --defer:#5c5c66; --green:#1fd17a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;-webkit-font-smoothing:antialiased}
body{background-image:radial-gradient(circle at 12% -5%,rgba(47,107,255,.07),transparent 38%),radial-gradient(circle at 92% 6%,rgba(245,224,0,.045),transparent 42%);min-height:100vh;padding-bottom:40px}
.mono{font-family:'Space Mono',monospace}
.pixel{font-family:'VT323',monospace}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}

/* ---- top bar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(10,10,11,.86);backdrop-filter:blur(12px);z-index:50}
.brand{display:flex;align-items:center;gap:14px}
.logo{font-family:'VT323',monospace;font-size:38px;line-height:.8;color:var(--yellow);text-shadow:0 0 18px rgba(245,224,0,.35);letter-spacing:1px}
.logo span{color:var(--blue-bright)}
.tagline{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.topstats{display:flex;gap:26px}
.tstat{text-align:right}
.tstat .v{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.tstat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.tstat .v.red{color:var(--crit)}.tstat .v.yl{color:var(--yellow)}.tstat .v.bl{color:var(--blue-bright)}.tstat .v.gr{color:var(--green)}

/* ---- tabs ---- */
.tabs{display:flex;gap:4px;padding:14px 26px 0;border-bottom:1px solid var(--line);background:var(--bg)}
.tab{padding:11px 20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:9px 9px 0 0;transition:.16s;letter-spacing:.02em}
.tab:hover{color:var(--text);background:var(--panel)}
.tab.active{color:var(--yellow);background:var(--panel);border-color:var(--line);position:relative;top:1px}
.tab .pixel{font-size:18px;margin-right:7px;vertical-align:-2px}

.wrap{padding:24px 26px;max-width:1480px;margin:0 auto}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-h{font-family:'VT323',monospace;font-size:26px;color:var(--text);margin-bottom:3px;letter-spacing:.5px}
.section-h b{color:var(--yellow)}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:18px}

/* ---- cards / grid ---- */
.grid{display:grid;gap:16px}
.panel{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:18px}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-h h3{font-size:14px;font-weight:700;letter-spacing:.02em}
.panel-h .hint{font-size:11px;color:var(--muted2)}

/* ---- KPI hero ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:linear-gradient(155deg,var(--panel2),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;opacity:.12;background:var(--blue)}
.kpi.k-red::after{background:var(--crit)}.kpi.k-yl::after{background:var(--yellow)}.kpi.k-gr::after{background:var(--green)}
.kpi .num{font-family:'Space Mono',monospace;font-size:34px;font-weight:700;line-height:1}
.kpi.k-red .num{color:var(--crit)}.kpi.k-yl .num{color:var(--yellow)}.kpi.k-bl .num{color:var(--blue-bright)}.kpi.k-gr .num{color:var(--green)}
.kpi .lab{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.35}
.kpi .sub{font-size:11px;color:var(--muted2);margin-top:4px}

/* ---- priority list ---- */
.tier-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;white-space:nowrap}
.tier-break_chain_critical{background:rgba(255,59,78,.15);color:var(--crit);border:1px solid rgba(255,59,78,.4)}
.tier-patch_this_week{background:rgba(255,140,26,.13);color:var(--week);border:1px solid rgba(255,140,26,.35)}
.tier-patch_this_month{background:rgba(255,201,60,.12);color:var(--month);border:1px solid rgba(255,201,60,.3)}
.tier-defer{background:rgba(92,92,102,.13);color:var(--defer);border:1px solid rgba(92,92,102,.3)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

.finding-row{display:grid;grid-template-columns:84px 1fr auto;gap:14px;align-items:center;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:var(--bg2);cursor:pointer;transition:.14s;margin-bottom:8px}
.finding-row:hover{border-color:var(--line2);background:var(--panel);transform:translateX(2px)}
.finding-row.is-crit{border-left:3px solid var(--crit)}
.fr-id{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
.fr-title{font-size:13.5px;font-weight:600;margin-bottom:4px}
.fr-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.chip{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
.chip.tool{color:var(--blue-bright)}
.chip.kev{color:var(--crit);border-color:rgba(255,59,78,.3);background:rgba(255,59,78,.08)}
.fr-right{text-align:right;min-width:120px}
.fr-score{font-family:'Space Mono',monospace;font-size:18px;font-weight:700}
.fr-chains{font-size:10px;color:var(--muted);margin-top:3px}

.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filt{font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);color:var(--muted);cursor:pointer;transition:.14s}
.filt:hover{color:var(--text);border-color:var(--line2)}
.filt.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:700}

/* ---- chains ---- */
.chain-card{border:1px solid var(--line);border-radius:13px;padding:16px;background:var(--bg2);margin-bottom:12px;transition:.16s}
.chain-card:hover{border-color:var(--line2)}
.chain-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chain-id{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
.chain-risk-badge{font-family:'Space Mono',monospace;font-weight:700;font-size:20px;padding:4px 12px;border-radius:9px}
.risk-hi{color:var(--crit);background:rgba(255,59,78,.12)}
.risk-md{color:var(--week);background:rgba(255,140,26,.12)}
.risk-lo{color:var(--month);background:rgba(255,201,60,.1)}
.chain-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cnode{display:flex;flex-direction:column;gap:3px;padding:9px 12px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);min-width:120px}
.cnode .t{font-size:11px;font-weight:600;line-height:1.25}
.cnode .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.cnode.entry{border-color:var(--blue)}
.cnode.cj{border-color:var(--crit);background:rgba(255,59,78,.08)}
.carrow{color:var(--yellow);font-size:18px;flex-shrink:0}
.chain-narr{font-size:12.5px;color:var(--muted);line-height:1.55;border-top:1px solid var(--line);padding-top:11px}
.chain-factors{display:flex;gap:14px;margin-top:11px;flex-wrap:wrap}
.factor{font-size:10px;color:var(--muted2)}
.factor b{color:var(--text);font-family:'Space Mono',monospace}

/* ---- attack graph ---- */
#graphWrap{position:relative;height:560px;border:1px solid var(--line);border-radius:13px;background:radial-gradient(circle at 50% 40%,#101015,#08080a);overflow:hidden}
#graphSvg{width:100%;height:100%;cursor:grab}
.glegend{position:absolute;top:14px;left:14px;background:rgba(10,10,11,.8);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:11px;backdrop-filter:blur(6px)}
.glegend .li{display:flex;align-items:center;gap:8px;margin:5px 0;color:var(--muted)}
.glegend .sw{width:12px;height:12px;border-radius:3px}
.gtip{position:absolute;pointer-events:none;background:rgba(20,20,26,.97);border:1px solid var(--line2);border-radius:9px;padding:10px 12px;font-size:11.5px;max-width:280px;opacity:0;transition:opacity .12s;z-index:20;line-height:1.5}

/* ---- charts ---- */
.bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:grid;grid-template-columns:120px 1fr 42px;gap:11px;align-items:center;font-size:12px}
.bar-track{height:22px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.bar-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.bar-row .cap{color:var(--muted);text-transform:capitalize}
.bar-row .val{font-family:'Space Mono',monospace;text-align:right;color:var(--text)}

.donut-wrap{display:flex;align-items:center;gap:24px}
.donut-legend{display:flex;flex-direction:column;gap:9px;font-size:12px}
.donut-legend .li{display:flex;align-items:center;gap:9px;color:var(--muted)}
.donut-legend .li b{color:var(--text);font-family:'Space Mono',monospace;margin-left:auto;padding-left:18px}

/* ---- agent ---- */
.agent-panel{display:flex;flex-direction:column;height:620px}
.chat-log{flex:1;overflow-y:auto;padding:6px 4px 6px 0;display:flex;flex-direction:column;gap:14px}
.msg{max-width:88%;font-size:13.5px;line-height:1.6}
.msg.user{align-self:flex-end;background:var(--blue);color:#fff;padding:11px 15px;border-radius:13px 13px 4px 13px}
.msg.bot{align-self:flex-start}
.msg.bot .bubble{background:var(--panel2);border:1px solid var(--line);padding:13px 16px;border-radius:13px 13px 13px 4px}
.msg.bot .bubble strong{color:var(--yellow)}
.msg .who{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.tool-trace{margin-top:9px;font-size:10.5px;color:var(--muted2);font-family:'Space Mono',monospace;border-left:2px solid var(--blue);padding-left:9px}
.tool-trace .tt{margin:2px 0}
.tool-trace .tt::before{content:'⚡ ';color:var(--yellow)}
.suggestions{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}
.sugg{font-size:11.5px;padding:7px 12px;border:1px solid var(--line2);border-radius:18px;color:var(--muted);cursor:pointer;transition:.14s;background:var(--bg2)}
.sugg:hover{color:#000;background:var(--yellow);border-color:var(--yellow)}
.chat-input{display:flex;gap:9px;margin-top:13px;border-top:1px solid var(--line);padding-top:14px}
.chat-input input{flex:1;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:13px 15px;color:var(--text);font-size:13.5px;font-family:'Sora',sans-serif;outline:none}
.chat-input input:focus{border-color:var(--blue)}
.chat-input button{background:var(--yellow);color:#000;border:none;border-radius:10px;padding:0 20px;font-weight:700;font-size:13px;cursor:pointer;transition:.14s}
.chat-input button:hover{background:#fff}
.sim-result{margin-top:10px;padding:13px;border:1px solid var(--green);border-radius:11px;background:rgba(31,209,122,.07)}
.sim-result .big{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--green)}

/* ---- brief ---- */
.brief-doc{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line2);border-radius:16px;padding:32px;max-width:920px;margin:0 auto}
.brief-head{border-bottom:2px solid var(--yellow);padding-bottom:18px;margin-bottom:24px}
.brief-head h2{font-family:'VT323',monospace;font-size:34px;color:var(--yellow);letter-spacing:.5px}
.brief-head .st{font-size:13px;color:var(--muted);margin-top:4px}
.brief-head .for{font-size:11px;color:var(--muted2);margin-top:8px;text-transform:uppercase;letter-spacing:.1em}
.brief-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.bk{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:15px}
.bk .n{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--blue-bright)}
.bk .n.red{color:var(--crit)}.bk .n.gr{color:var(--green)}
.bk .l{font-size:11px;color:var(--muted);margin-top:5px}
.brief-sec-h{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yellow);margin:24px 0 12px}
.action-box{border:1px solid var(--green);background:rgba(31,209,122,.07);border-radius:12px;padding:18px;display:flex;align-items:center;gap:20px}
.action-box .big{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;color:var(--green);white-space:nowrap}
.action-box .txt{font-size:13px;line-height:1.5}
.action-box .txt b{color:var(--yellow)}
.bchain{border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:10px;background:var(--bg2)}
.bchain .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.bchain .rk{font-family:'Space Mono',monospace;font-weight:700;color:var(--crit)}
.bchain .nr{font-size:12px;color:var(--muted);line-height:1.5}
.bchain .ctrls{margin-top:9px;display:flex;gap:6px;flex-wrap:wrap}
.ctrl-tag{font-size:9.5px;padding:3px 8px;border-radius:6px;background:rgba(47,107,255,.1);border:1px solid rgba(47,107,255,.3);color:var(--blue-bright)}
.compliance{font-size:11.5px;color:var(--muted);line-height:1.6;border-top:1px solid var(--line);padding-top:16px;margin-top:22px;font-style:italic}
.btn-gen{background:var(--yellow);color:#000;border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:13px;cursor:pointer}

/* ---- finding modal ---- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:30px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;padding:26px}
.modal-close{float:right;cursor:pointer;color:var(--muted);font-size:22px;line-height:1}
.modal h3{font-size:18px;margin-bottom:6px;padding-right:30px}
.modal .mid{font-family:'Space Mono',monospace;font-size:12px;color:var(--blue-bright);margin-bottom:16px}
.modal .desc{font-size:13.5px;color:var(--muted);line-height:1.6;margin:14px 0;padding:14px;background:var(--bg2);border-radius:10px;border:1px solid var(--line)}
.kv{display:grid;grid-template-columns:140px 1fr;gap:8px 14px;font-size:12.5px;margin:12px 0}
.kv .k{color:var(--muted2)}
.kv .v{color:var(--text);font-family:'Space Mono',monospace}
.modal-sim{margin-top:16px}

.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
@media(max-width:1100px){.two-col{grid-template-columns:1fr}.kpis,.brief-kpis{grid-template-columns:repeat(2,1fr)}}

/* ---- AI pill (top bar) ---- */
.ai-pill{display:flex;align-items:center;gap:9px;padding:8px 13px;border:1px solid var(--line2);border-radius:22px;background:linear-gradient(135deg,rgba(47,107,255,.12),rgba(245,224,0,.08));font-size:11px;cursor:help}
.ai-dot{width:8px;height:8px;border-radius:50%;display:inline-block;box-shadow:0 0 8px currentColor}
.ai-dot.on{background:var(--green);color:var(--green);animation:pulse 1.6s infinite}
.ai-dot.off{background:var(--muted2);color:var(--muted2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.ai-model{font-family:'Space Mono',monospace;font-weight:700;color:var(--text)}
.ai-mode{font-family:'Space Mono',monospace;font-size:10px;color:var(--yellow);padding:2px 6px;border-radius:4px;background:rgba(245,224,0,.1);border:1px solid rgba(245,224,0,.3)}
.ai-pill .ai-mode{font-weight:700}
.ai-roles{color:var(--muted);font-size:10px}

/* ---- narrative badge on chain cards ---- */
.narr-badge{display:inline-block;font-size:10px;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:6px;margin-right:9px;font-weight:700;letter-spacing:.04em}
.narr-badge.llm{background:rgba(47,107,255,.13);color:var(--blue-bright);border:1px solid rgba(47,107,255,.4)}
.narr-badge.offline{background:rgba(92,92,102,.13);color:var(--muted);border:1px solid var(--line2)}

/* ---- agent banner ---- */
.agent-banner{display:flex;align-items:center;gap:11px;padding:11px 16px;border-radius:11px;font-size:12.5px;margin-bottom:14px;border:1px solid var(--line2)}
.agent-banner.live{background:linear-gradient(135deg,rgba(31,209,122,.08),rgba(47,107,255,.06));border-color:rgba(31,209,122,.3)}
.agent-banner.offline{background:var(--bg2)}
.agent-banner b{color:var(--text)}

/* ---- AI engine tab ---- */
.ai-hero{display:grid;grid-template-columns:1fr 2fr;gap:18px;margin-bottom:20px;padding:22px 24px;border:1px solid var(--line2);border-radius:14px;background:linear-gradient(135deg,rgba(47,107,255,.07),rgba(245,224,0,.04))}
.ai-hero-label{font-size:10px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
.ai-hero-model{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--yellow);letter-spacing:.01em}
.ai-hero-sub{font-size:12px;color:var(--muted);margin-top:4px}
.ai-status-pill{display:inline-flex;align-items:center;gap:9px;padding:8px 14px;border-radius:18px;font-size:12px;font-weight:700;letter-spacing:.02em;margin-bottom:8px;border:1px solid var(--line2)}
.ai-status-pill.live{color:var(--green);background:rgba(31,209,122,.1);border-color:rgba(31,209,122,.4)}
.ai-status-pill.offline{color:var(--muted);background:var(--bg2)}
.ai-status-note{font-size:12.5px;color:var(--muted);line-height:1.55}
.ai-status-note .mono{font-family:'Space Mono',monospace;font-size:11px;color:var(--yellow);padding:1px 6px;background:var(--bg2);border-radius:4px;border:1px solid var(--line)}

.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
@media(max-width:1000px){.role-grid{grid-template-columns:1fr}}
.role-card{border:1px solid var(--line);border-radius:13px;padding:18px;background:var(--bg2);transition:.15s}
.role-card:hover{border-color:var(--line2);transform:translateY(-2px)}
.role-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.role-icon{font-size:24px}
.role-name{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--text)}
.role-pattern{font-size:10.5px;color:var(--muted);margin-top:2px}
.role-status{margin-left:auto;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.04em}
.role-status.live{color:var(--green);background:rgba(31,209,122,.13);border:1px solid rgba(31,209,122,.4)}
.role-status.off{color:var(--muted);background:var(--bg)}
.role-what,.role-flow{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:9px}
.role-what b,.role-flow b{color:var(--text);font-weight:700;display:block;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;color:var(--yellow)}
.role-io{display:grid;grid-template-columns:1fr;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
.io-l{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;color:var(--blue-bright);letter-spacing:.1em;padding:2px 6px;border:1px solid rgba(47,107,255,.3);border-radius:4px;margin-right:7px;background:rgba(47,107,255,.05);font-weight:700}
.role-tools{margin-top:11px;padding-top:10px;border-top:1px solid var(--line);font-size:11px}
.tool-chip{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;margin:3px 4px 0 0;background:var(--panel2);border:1px solid var(--line2);border-radius:5px;color:var(--text)}

.ai-flow{border:1px solid var(--line2);border-radius:14px;padding:22px;background:var(--bg2);margin-bottom:22px;overflow-x:auto}
.ai-flow-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--yellow);letter-spacing:.1em;margin-bottom:14px}
.ai-flow-row{display:flex;gap:8px;align-items:stretch;min-width:980px}
.ai-step{flex:1;min-width:160px;padding:13px;border-radius:10px;border:1px solid var(--line)}
.ai-step.det{background:rgba(92,92,102,.06);border-color:var(--line)}
.ai-step.llm{background:rgba(47,107,255,.07);border-color:rgba(47,107,255,.35)}
.ai-step-n{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px}
.ai-step-t{font-size:11.5px;font-weight:700;color:var(--text);margin-bottom:7px;letter-spacing:.02em}
.ai-step.llm .ai-step-t{color:var(--blue-bright)}
.ai-step-d{font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:9px}
.ai-step-tag{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--muted2);padding-top:7px;border-top:1px solid var(--line)}
.ai-step.llm .ai-step-tag{color:var(--yellow)}
.ai-arrow{display:flex;align-items:center;color:var(--yellow);font-size:18px;flex-shrink:0}

.ai-why-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--yellow);letter-spacing:.1em;margin-bottom:14px}
.ai-why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1000px){.ai-why-grid{grid-template-columns:repeat(2,1fr)}}
.ai-why-card{padding:14px;background:var(--bg2);border:1px solid var(--line);border-radius:11px}
.why-h{font-size:13px;font-weight:700;color:var(--yellow);margin-bottom:6px}
.why-b{font-size:11.5px;color:var(--muted);line-height:1.5}

/* ---- upload tab ---- */
.up-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1100px){.up-grid{grid-template-columns:1fr}}
.dropzone{border:2px dashed var(--line2);border-radius:16px;padding:44px 24px;text-align:center;cursor:pointer;transition:.18s;background:var(--bg2)}
.dropzone:hover,.dropzone.drag{border-color:var(--yellow);background:rgba(245,224,0,.04)}
.dz-icon{font-size:34px;color:var(--yellow);margin-bottom:10px}
.dz-title{font-size:16px;font-weight:700;margin-bottom:6px}
.dz-sub{font-size:12.5px;color:var(--muted)}
.dz-browse{color:var(--blue-bright);text-decoration:underline;cursor:pointer}
.up-mode{margin-top:14px;padding:11px 15px;border-radius:10px;font-size:12px;color:var(--muted);border:1px solid var(--line2);line-height:1.5;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.up-mode.live{border-color:rgba(31,209,122,.35);background:rgba(31,209,122,.06)}
.up-mode.offline{background:var(--bg2)}
.up-mode b{color:var(--text)}
.up-mode .mono{font-family:'Space Mono',monospace;font-size:11px;color:var(--yellow);background:var(--bg);padding:1px 6px;border-radius:4px;border:1px solid var(--line)}
.up-formats{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.fmt-card{display:flex;align-items:center;gap:14px;padding:13px 15px;border:1px solid var(--line);border-radius:11px;background:var(--bg2)}
.fmt-x{font-family:'Space Mono',monospace;font-size:20px;color:var(--blue-bright);width:32px;text-align:center}
.fmt-card b{font-size:13px}
.fmt-card span:last-child{display:block;font-size:11px;color:var(--muted);margin-top:2px}

.pipe-file{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--bg2)}
.pf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.pf-name{font-size:13px;font-weight:600;font-family:'Space Mono',monospace}
.pf-fmt{font-size:10px;font-family:'Space Mono',monospace;color:var(--blue-bright);padding:2px 8px;border:1px solid rgba(47,107,255,.3);border-radius:5px;background:rgba(47,107,255,.06)}
.pf-steps{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.pf-step{font-size:11.5px;color:var(--muted2);padding:6px 11px;border-radius:7px;background:var(--bg);border:1px solid var(--line);transition:.2s}
.pf-step.run{color:var(--yellow);border-color:rgba(245,224,0,.4);background:rgba(245,224,0,.05);animation:pulse 1.2s infinite}
.pf-step.done{color:var(--green);border-color:rgba(31,209,122,.3)}
.pf-step.done::after{content:' ✓';color:var(--green)}
.pf-step.err{color:var(--crit);border-color:rgba(255,59,78,.4)}
.pf-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.pf-stat{font-size:11px;padding:4px 10px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
.pf-stat b{color:var(--text);font-family:'Space Mono',monospace}
.pf-stat.ok b{color:var(--green)}.pf-stat.warn b{color:var(--week)}.pf-stat.ai{color:var(--blue-bright)}
.pf-merge{font-size:12px;color:var(--muted);padding:9px 12px;background:rgba(255,59,78,.05);border:1px solid rgba(255,59,78,.2);border-radius:8px;margin-bottom:9px}
.pf-merge b{font-family:'Space Mono',monospace;color:var(--text)}
.pf-review{border-top:1px solid var(--line);padding-top:10px}
.pf-review-h{font-size:11.5px;color:var(--week);font-weight:700;margin-bottom:8px}
.pf-rev-row{font-size:11.5px;padding:7px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:4px}
.pf-conf{font-family:'Space Mono',monospace;color:var(--week);font-size:10.5px}
.pf-rev-reason{grid-column:1/-1;color:var(--muted2);font-size:10.5px;font-style:italic}
.pf-err{color:var(--crit);font-size:12px;padding:8px}
</style>

<script>/* ===================== VulnIQ Dashboard App ===================== */
/* D and its derived views start from the baked-in snapshot, but are reassigned
   by applyData() whenever live backend data is loaded (on startup + after each
   upload), so every page reflects the cumulative state of the session. */
let D = window.VULNIQ_DATA;
let F = D.findings, CH = D.chains, S = D.stats, G = D.graph, BR = D.brief;
let ASSETS = {}; (D.assets||[]).forEach(a=>ASSETS[a.asset_id]=a);
let fmap = {}; F.forEach(f=>fmap[f.finding_id]=f);

function applyData(nd){
  D = nd;
  F = D.findings||[]; CH = D.chains||[]; S = D.stats||{};
  // defensive defaults so a historical/partial snapshot can never throw inside a
  // render function (which would silently leave the previous run on screen)
  S.by_tool=S.by_tool||{}; S.by_layer=S.by_layer||{}; S.by_priority=S.by_priority||{};
  S.by_source=S.by_source||{}; S.by_objective=S.by_objective||{};
  G = D.graph||{nodes:[],edges:[]}; BR = D.brief||{};
  BR.headline=BR.headline||{};
  ASSETS = {}; (D.assets||[]).forEach(a=>ASSETS[a.asset_id]=a);
  fmap = {}; F.forEach(f=>fmap[f.finding_id]=f);
}

const TIER_LABEL = {
  break_chain_critical:'Break-Chain Critical', patch_this_week:'Patch This Week',
  patch_this_month:'Patch This Month', defer:'Lower priority'
};
// Severity from the source tool (Snyk / manual report) — independent of
// VulnIQ's chain-aware priority. Used to label "Lower priority" findings
// with the severity their originating scanner actually assigned.
const SEV_COLOR = {critical:'#ff3b4e', high:'#ff8c1a', medium:'#ffc93c', low:'#7c83fd', info:'#5c5c66'};
function sevLabel(f){
  const raw = (f.raw_severity||'').toString().toLowerCase().trim();
  if(SEV_COLOR[raw]) return raw;
  // Fall back to CVSS-derived severity so non-Snyk uploads without a
  // tool-native severity still get a useful chip.
  const c = +f.cvss || 0;
  if(c >= 9) return 'critical';
  if(c >= 7) return 'high';
  if(c >= 4) return 'medium';
  if(c > 0)  return 'low';
  return 'info';
}
const TIER_COLOR = {break_chain_critical:'var(--crit)',patch_this_week:'var(--week)',patch_this_month:'var(--month)',defer:'var(--defer)'};
const LAYER_COLOR = {appsec_runtime:'#2f6bff',dependency:'#9b6bff',source_code:'#ff8c1a',iam_identity:'#1fd17a',infra_host:'#ff3b4e',cloud_config:'#00c2d1',container:'#ffc93c',network:'#f5e000',data:'#ff5bb0'};
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmtScore = n => n>=1000?(n/1000).toFixed(1)+'k':Math.round(n);

/* ---------- shell ---------- */
function shell(){
  const r = document.getElementById('root');
  r.innerHTML = `
  <div class="topbar">
    <div class="brand">
      <div class="logo">VULN<span>IQ</span></div>
      <div><div style="font-size:13px;font-weight:700">Attack-Chain Prioritization Engine</div>
      <div class="tagline">Unified · Multi-Layer · Context-Aware</div></div>
    </div>
    <div class="topstats">
      <div class="ai-pill" id="aiPill" title="${esc(D.ai_status.note)}">
        <span class="ai-dot ${D.ai_status.llm_enabled?'on':'off'}" id="aiDot"></span>
        <span class="ai-model">${esc(D.ai_status.model)}</span>
        <span class="ai-mode" id="aiMode">${D.ai_status.llm_enabled?'LIVE':'OFFLINE'}</span>
        <span class="ai-roles">${D.ai_status.roles.length} agents</span>
      </div>
      <button id="refreshBtn" onclick="loadLiveData('manual')" title="Re-pull the latest findings, chains, graph & brief from the backend"
        style="cursor:pointer;border:1px solid var(--line2);background:var(--bg2);color:var(--text);font:600 12px/1 inherit;padding:8px 12px;border-radius:9px;display:flex;align-items:center;gap:6px">↻ <span id="refreshLbl">Refresh</span></button>
      <div class="tstat"><div class="v red" id="tb-chains">${S.total_chains}</div><div class="l">Attack Chains</div></div>
      <div class="tstat"><div class="v yl" id="tb-risk">${BR.headline.org_risk_score}</div><div class="l">Org Risk</div></div>
      <div class="tstat"><div class="v bl" id="tb-findings">${S.total_findings}</div><div class="l">Findings</div></div>
      <div class="tstat"><div class="v gr" id="tb-noise">${BR.headline.noise_reduction_pct}%</div><div class="l">Noise Cut</div></div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" data-v="overview"><span class="pixel">[#]</span>Overview</div>
    <div class="tab" data-v="upload"><span class="pixel">[^]</span>Upload Findings</div>
    <div class="tab" data-v="priorities"><span class="pixel">[!]</span>Priorities</div>
    <div class="tab" data-v="chains"><span class="pixel">[>]</span>Attack Chains</div>
    <div class="tab" data-v="graph"><span class="pixel">[*]</span>Attack Graph</div>
    <div class="tab" data-v="agent"><span class="pixel">[?]</span>Ask VulnIQ</div>
    <div class="tab" data-v="ownership"><span class="pixel">[@]</span>Ownership</div>
    <div class="tab" data-v="ai"><span class="pixel">[~]</span>AI Engine</div>
    <div class="tab" data-v="history"><span class="pixel">[~]</span>History</div>
    <div class="tab" data-v="brief"><span class="pixel">[=]</span>Exec Brief</div>
  </div>
  <div class="wrap">
    <div class="view active" id="v-overview"></div>
    <div class="view" id="v-upload"></div>
    <div class="view" id="v-priorities"></div>
    <div class="view" id="v-chains"></div>
    <div class="view" id="v-graph"></div>
    <div class="view" id="v-agent"></div>
    <div class="view" id="v-ownership"></div>
    <div class="view" id="v-ai"></div>
    <div class="view" id="v-history"></div>
    <div class="view" id="v-brief"></div>
  </div>
  <div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>`;

  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const v = t.dataset.v;
    document.getElementById('v-'+v).classList.add('active');
    if(v==='graph') setTimeout(drawGraph,40);
  });
  document.getElementById('modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal();};

  renderOverview(); renderUpload(); renderPriorities(); renderChains(); renderGraphView(); renderAgent(); renderOwnership(); renderAI(); renderBrief();
}

/* ---------- overview ---------- */
function renderOverview(){
  const h = BR.headline;
  const crit = F.filter(f=>f.priority==='break_chain_critical').sort((a,b)=>b.final_score-a.final_score);
  document.getElementById('v-overview').innerHTML = `
  <div class="section-h">SECURITY <b>POSTURE</b></div>
  <div class="section-sub">What ${S.total_findings} findings from ${Object.keys(S.by_tool).length} tools across ${Object.keys(S.by_layer).length} layers actually mean — chained into real breach paths.</div>
  <div class="kpis">
    <div class="kpi k-red"><div class="num">${S.total_chains}</div><div class="lab">Cross-layer attack chains to crown jewels</div><div class="sub">No single tool sees these</div></div>
    <div class="kpi k-yl"><div class="num">${h.org_risk_score}</div><div class="lab">Aggregate org risk score</div><div class="sub">Top-10 chain weighted</div></div>
    <div class="kpi k-bl"><div class="num">${S.correlation_clusters}</div><div class="lab">Correlation clusters found</div><div class="sub">Shared root causes</div></div>
    <div class="kpi k-gr"><div class="num">${h.noise_reduction_pct}%</div><div class="lab">Findings deprioritized as noise</div><div class="sub">${h.deferred_as_noise} of ${S.total_findings} are not on any chain</div></div>
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="panel-h"><h3>🔴 Break-Chain Critical — fix these first</h3><span class="hint">on the most breach paths</span></div>
      <div id="ov-crit"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><h3>Findings by OSI Layer</h3><span class="hint">${S.total_findings} total</span></div>
      <div class="bars" id="ov-layers"></div>
      <div class="panel-h" style="margin-top:22px"><h3>Priority Distribution</h3></div>
      <div class="donut-wrap"><canvas id="ov-donut" width="150" height="150"></canvas><div class="donut-legend" id="ov-donut-leg"></div></div>
    </div>
  </div>`;

  document.getElementById('ov-crit').innerHTML = crit.map(f=>findingRow(f)).join('');
  bindRows('ov-crit');

  // layer bars
  const maxL = Math.max(...Object.values(S.by_layer));
  document.getElementById('ov-layers').innerHTML = Object.entries(S.by_layer)
    .sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div class="bar-row"><span class="cap">${k.replace(/_/g,' ')}</span>
      <div class="bar-track"><div class="bar-fill" style="width:0%;background:${LAYER_COLOR[k]||'var(--blue)'}" data-w="${v/maxL*100}"></div></div>
      <span class="val">${v}</span></div>`).join('');
  setTimeout(()=>document.querySelectorAll('#ov-layers .bar-fill').forEach(b=>b.style.width=b.dataset.w+'%'),60);

  drawDonut();
}

function drawDonut(){
  const c = document.getElementById('ov-donut'); if(!c) return;
  const ctx = c.getContext('2d');
  const data = S.by_priority;
  const order=['break_chain_critical','patch_this_week','patch_this_month','defer'];
  const total = Object.values(data).reduce((a,b)=>a+b,0);
  let start=-Math.PI/2;
  order.forEach(k=>{
    const val=data[k]||0; if(!val)return;
    const ang=val/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(75,75);
    ctx.arc(75,75,72,start,start+ang);ctx.closePath();
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue(TIER_COLOR[k].replace('var(','').replace(')','')).trim()||'#555';
    ctx.fill();start+=ang;
  });
  ctx.beginPath();ctx.arc(75,75,44,0,Math.PI*2);ctx.fillStyle='#0a0a0b';ctx.fill();
  ctx.fillStyle='#f3f3f5';ctx.font='bold 22px Space Mono';ctx.textAlign='center';
  ctx.fillText(total,75,72);ctx.fillStyle='#8a8a94';ctx.font='10px Sora';ctx.fillText('FINDINGS',75,88);
  document.getElementById('ov-donut-leg').innerHTML = order.filter(k=>data[k]).map(k=>`
    <div class="li"><span class="dot" style="background:${TIER_COLOR[k]}"></span>${TIER_LABEL[k]}<b>${data[k]}</b></div>`).join('');
}

/* ---------- priorities ---------- */
let curFilter='all';
function renderPriorities(){
  document.getElementById('v-priorities').innerHTML = `
  <div class="section-h">PRIORITIZED <b>FINDINGS</b></div>
  <div class="section-sub">Ranked by attack-chain centrality, not raw CVSS. A "Medium" on 7 chains beats a "Critical" on none.</div>
  <div class="filters" id="prio-filters">
    <div class="filt active" data-f="all">All on chains</div>
    <div class="filt" data-f="break_chain_critical">🔴 Break-Chain Critical</div>
    <div class="filt" data-f="patch_this_week">🟠 This Week</div>
    <div class="filt" data-f="patch_this_month">🟡 This Month</div>
    <div class="filt" data-f="defer">⚪ Lower priority</div>
  </div>
  <div id="prio-list"></div>`;
  document.querySelectorAll('#prio-filters .filt').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#prio-filters .filt').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');curFilter=b.dataset.f;paintPrio();
  });
  paintPrio();
}
function paintPrio(){
  let list = F.slice();
  if(curFilter==='all') list=list.filter(f=>f.chain_count>0);
  else if(curFilter==='defer') list=list.filter(f=>f.priority==='defer');
  else list=list.filter(f=>f.priority===curFilter);
  // collapse by remediation group — one row per actual fix, with an instance count
  const groups={};
  for(const f of list){ const k=f.remediation_group||f.finding_id; (groups[k]=groups[k]||[]).push(f); }
  const rows=Object.values(groups).map(members=>{
    members.sort((a,b)=>(b.final_score||0)-(a.final_score||0));
    const instances=members.reduce((s,f)=>s+(f.duplicate_count||1),0);
    return {rep:members[0], members, instances};
  });
  rows.sort((a,b)=>(b.rep.final_score||0)-(a.rep.final_score||0));
  const el=document.getElementById('prio-list');
  if(!rows.length){el.innerHTML=`<div class="panel" style="text-align:center;color:var(--muted)">No findings in this tier.</div>`;return;}
  const collapsed=list.length-rows.length;
  el.innerHTML=(collapsed>0?`<div style="font-size:11px;color:var(--muted2);margin-bottom:10px">▾ ${rows.length} remediation items · ${collapsed} duplicate/related finding${collapsed>1?'s':''} grouped</div>`:'')
    + rows.slice(0,60).map(g=>findingRow(g.rep,g)).join('')
    + (curFilter==='defer'?`<div style="text-align:center;color:var(--muted2);font-size:12px;margin-top:10px">…showing a sample. ${S.by_priority.defer} findings total — still real findings, just lower priority because they don't sit on a viable attack chain right now. Severity shown is what the source tool assigned.</div>`:'');
  bindRows('prio-list');
}

function findingRow(f, group){
  const crit = f.priority==='break_chain_critical';
  const instances = group?group.instances:(f.duplicate_count||1);
  const others = group?group.members.filter(m=>m.finding_id!==f.finding_id):[];
  const instBadge = instances>1?`<span class="chip" style="background:rgba(124,131,253,.15);color:var(--blue);font-weight:700">⊕ ${instances}× same fix</span>`:'';
  const action = f.remediation_action?`<span class="chip" style="opacity:.8">🔧 ${esc(f.remediation_action)}</span>`:'';
  const otherLine = others.length?`<div style="font-size:10px;color:var(--muted2);margin-top:4px">grouped: ${others.slice(0,6).map(m=>esc(m.finding_id)).join(', ')}${others.length>6?` +${others.length-6} more`:''}</div>`:'';
  return `<div class="finding-row ${crit?'is-crit':''}" data-fid="${f.finding_id}">
    <div><div class="fr-id">${f.finding_id}</div><div style="margin-top:6px"><span class="tier-tag tier-${f.priority}"><span class="dot" style="background:${TIER_COLOR[f.priority]}"></span></span></div></div>
    <div>
      <div class="fr-title">${esc(f.title)} ${instBadge}</div>
      ${otherLine}
      <div class="fr-meta">
        ${action}
        ${(()=>{const sv=sevLabel(f),col=SEV_COLOR[sv]||'#5c5c66';return `<span class="chip" style="background:${col}22;color:${col};border:1px solid ${col}55;font-weight:700;letter-spacing:.3px">${sv.toUpperCase()}</span>`;})()}
        ${((f.sources&&f.sources.length?f.sources:[f.source_tool])).map(s=>`<span class="chip tool" ${String(s).startsWith('Snyk')?'style="background:rgba(124,131,253,.14);color:var(--blue)"':''}>${String(s).startsWith('Snyk')?'⚡ ':''}${esc(s)}</span>`).join('')}
        <span class="chip">${f.layer.replace(/_/g,' ')}</span>
        <span class="chip">${esc(f.affected_asset_id)}</span>
        ${f.location&&f.location.indexOf('repo:')===0?`<span class="chip" style="opacity:.7">${esc(f.location)}</span>`:''}
        ${(f.attack_objectives||[]).slice(0,2).map(o=>`<span class="chip" style="background:rgba(255,59,78,.12);color:var(--crit)">🎯 ${esc(o.replace(/_/g,' '))}</span>`).join('')}
        ${f.in_kev?'<span class="chip kev">CISA KEV</span>':''}
        <span>CVSS ${f.cvss}</span>
        <span>EPSS ${(f.epss*100).toFixed(0)}%</span>
      </div>
    </div>
    <div class="fr-right">
      ${f.priority_p?`<div class="fr-plevel" style="font-weight:800;font-size:15px;letter-spacing:1px;color:${TIER_COLOR[f.priority]}">${f.priority_p}</div>`:''}
      <div class="fr-score" style="color:${f.chain_count>0?TIER_COLOR[f.priority]:'var(--muted2)'}">${fmtScore(f.final_score||0)}</div>
      <div class="fr-chains">${f.chains_collapsed>0?`⚡ breaks ${f.chains_collapsed} chain${f.chains_collapsed>1?'s':''}${f.crown_paths_collapsed>0?` · ${f.crown_paths_collapsed} crown`:''}`:(f.chain_count>0?`on ${f.chain_count} chain${f.chain_count>1?'s':''}`:'no chain')}</div>
      ${f.remediation_leverage_label&&f.remediation_leverage_label!=='None'?`<div style="font-size:10px;margin-top:2px;font-weight:700;color:${f.remediation_leverage_label==='Very High'?'var(--crit)':f.remediation_leverage_label==='High'?'var(--week)':'var(--muted2)'}">leverage ${f.remediation_leverage_label}</div>`:''}
    </div>
  </div>`;
}
function bindRows(id){document.querySelectorAll('#'+id+' .finding-row').forEach(r=>r.onclick=()=>openFinding(r.dataset.fid));}

/* ---------- chains ---------- */
/* Per-chain LLM narratives are fetched lazily on click (keeps the bulk refresh
   free). Cached by the chain's finding sequence so it survives re-renders and
   even chain-id changes after a recompute. */
const chainNarrCache = {};

function renderChains(){
  document.getElementById('v-chains').innerHTML = `
  <div class="section-h">ATTACK <b>CHAINS</b></div>
  <div class="section-sub">Paths from an exposed entry point through capability handoffs to a crown jewel. Each ChainRisk = exposure × exploitability × feasibility × jewel-value × control-gap.</div>
  <div id="chain-list"></div>`;
  document.getElementById('chain-list').innerHTML = CH.map(chainCard).join('');

function chainNarrInner(c){

/* Fetch the on-demand LLM narrative for one chain and swap it in place.
   The backend caches by finding-sequence, so repeat clicks/recomputes are free. */
async function loadChainNarrative(cid){
  const el = document.getElementById('cn-'+cid);
  const c = CH.find(x=>x.chain_id===cid);
  if(!el || !c) return;
  const btn = el.querySelector('.narr-ai-btn');
  if(btn){ btn.disabled=true; btn.textContent='✨ generating…'; btn.style.opacity=.6; }
  try{
    const d = await fetch(BACKEND_URL+'/api/chains/'+encodeURIComponent(cid)).then(r=>{
      if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
    });
    const method = d.narrative_method || 'llm';
    chainNarrCache[c.finding_ids.join('>')] = {narrative:d.narrative, method};
    el.innerHTML = chainNarrInner(c);  // re-reads the cache we just populated
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='✨ Get AI narrative'; btn.style.opacity=1; }
    const t=document.createElement('div');
    t.style.cssText='color:var(--muted);font-size:12px;margin-top:6px';
    t.textContent='AI narrative unavailable: '+e.message;
    el.appendChild(t);
    console.warn('chain narrative failed', e);
  }
}

let gSim=null;
function drawGraph(){
  const svg=document.getElementById('graphSvg'); if(!svg||svg.dataset.drawn)return;
  const W=svg.clientWidth||1200,H=svg.clientHeight||560;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const nodes=G.nodes.map(n=>({...n,x:W/2+(Math.random()-.5)*300,y:H/2+(Math.random()-.5)*240,vx:0,vy:0}));
  const idx={};nodes.forEach((n,i)=>idx[n.id]=i);
  const links=G.edges.filter(e=>idx[e.source]!=null&&idx[e.target]!=null)
    .map(e=>({...e,s:idx[e.source],t:idx[e.target]}));

  const NS='http://www.w3.org/2000/svg';
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const defs=document.createElementNS(NS,'defs');
  defs.innerHTML=`<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f5e000"/></marker>`;
  svg.appendChild(defs);
  const gLinks=document.createElementNS(NS,'g'),gNodes=document.createElementNS(NS,'g');
  svg.appendChild(gLinks);svg.appendChild(gNodes);

  const lineEls=links.map(l=>{
    const ln=document.createElementNS(NS,'line');
    const enable=l.kind==='ENABLES';
    ln.setAttribute('stroke',enable?'#f5e000':'#444');
    ln.setAttribute('stroke-width',enable?2:1);
    ln.setAttribute('stroke-dasharray',enable?'0':'4 4');
    ln.setAttribute('opacity',enable?.85:.4);
    if(enable)ln.setAttribute('marker-end','url(#arrow)');
    gLinks.appendChild(ln);return ln;
  });
  const nodeEls=nodes.map(n=>{
    const g=document.createElementNS(NS,'g');g.style.cursor='grab';
    const isF=n.kind==='finding',isCJ=n.kind==='crown_jewel';
    const r=isCJ?15:isF?9:12;
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('r',r);
    c.setAttribute('fill',isCJ?'#ff3b4e':isF?'#f5e000':'#2f6bff');
    c.setAttribute('stroke','#0a0a0b');c.setAttribute('stroke-width',2);
    if(n.in_kev){c.setAttribute('stroke','#ff3b4e');c.setAttribute('stroke-width',3);}
    g.appendChild(c);
    const t=document.createElementNS(NS,'text');
    t.textContent=isF?n.id:(n.label||n.id).slice(0,18);
    t.setAttribute('font-size',isF?9:10);t.setAttribute('fill',isF?'#cfcf55':'#cdd6ff');
    t.setAttribute('text-anchor','middle');t.setAttribute('dy',r+13);
    t.setAttribute('font-family','Space Mono, monospace');
    g.appendChild(t);
    gNodes.appendChild(g);
    g.addEventListener('mouseenter',e=>showTip(e,n));
    g.addEventListener('mouseleave',hideTip);
    g.addEventListener('mousedown',e=>startDrag(e,n));
    g.addEventListener('click',()=>{if(n.kind==='finding')openFinding(n.id);});
    return g;
  });

  function tick(){
    // forces
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y;let d=Math.sqrt(dx*dx+dy*dy)||1;
        const rep=2600/(d*d);a.vx+=dx/d*rep;a.vy+=dy/d*rep;b.vx-=dx/d*rep;b.vy-=dy/d*rep;
      }
    }
    links.forEach(l=>{
      const a=nodes[l.s],b=nodes[l.t];let dx=b.x-a.x,dy=b.y-a.y;let d=Math.sqrt(dx*dx+dy*dy)||1;
      const k=(d-115)*0.015;a.vx+=dx/d*k;a.vy+=dy/d*k;b.vx-=dx/d*k;b.vy-=dy/d*k;
    });
    nodes.forEach(n=>{
      n.vx+=(W/2-n.x)*0.002;n.vy+=(H/2-n.y)*0.002;
      n.vx*=.86;n.vy*=.86;
      if(!n.fixed){n.x+=n.vx;n.y+=n.vy;}
      n.x=Math.max(40,Math.min(W-40,n.x));n.y=Math.max(40,Math.min(H-50,n.y));
    });
    lineEls.forEach((ln,i)=>{const l=links[i];ln.setAttribute('x1',nodes[l.s].x);ln.setAttribute('y1',nodes[l.s].y);ln.setAttribute('x2',nodes[l.t].x);ln.setAttribute('y2',nodes[l.t].y);});
    nodeEls.forEach((g,i)=>g.setAttribute('transform',`translate(${nodes[i].x},${nodes[i].y})`));
  }
  let frames=0;
  function loop(){tick();frames++;if(frames<600&&!dragNode)gSim=requestAnimationFrame(loop);else if(dragNode)gSim=requestAnimationFrame(loop);}
  loop();

  // drag
  let dragNode=null,offset={x:0,y:0};
  function startDrag(e,n){dragNode=n;n.fixed=true;const p=pt(e);offset={x:p.x-n.x,y:p.y-n.y};if(!gSim)loop();}
  function pt(e){const r=svg.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H};}
  svg.addEventListener('mousemove',e=>{if(dragNode){const p=pt(e);dragNode.x=p.x-offset.x;dragNode.y=p.y-offset.y;dragNode.vx=dragNode.vy=0;}});
  window.addEventListener('mouseup',()=>{if(dragNode){dragNode.fixed=false;dragNode=null;}});
  svg.dataset.drawn='1';
}

/* ---------- patch simulation (client-side, mirrors backend) ---------- */
function simulatePatch(ids){
  // Mirror the backend formula exactly (engine.simulate_patch + engine.stats):
  // sum chain_risk across ALL chains, not just the top 10. Top-10 made small
  // patches read as 0% drop when the collapsed chains weren't in the lead,
  // and made the modal disagree with the brief's recommended-action figure.
  const set=new Set(ids);
  const before=CH.length;
  const beforeRisk=Math.round(CH.reduce((a,c)=>a+(c.chain_risk||0),0)*10)/10;
  const surviving=CH.filter(c=>!c.finding_ids.some(f=>set.has(f)));
  const after=surviving.length;
  const afterRisk=Math.round(surviving.reduce((a,c)=>a+(c.chain_risk||0),0)*10)/10;
  return {patched:ids,chains_before:before,chains_after:after,chains_collapsed:before-after,
    org_risk_before:beforeRisk,org_risk_after:afterRisk,
    risk_drop_pct:beforeRisk?Math.round((beforeRisk-afterRisk)/beforeRisk*1000)/10:0};
}
function bestSingleFix(){
  const cands=F.filter(f=>f.chain_count>0).sort((a,b)=>b.chain_count-a.chain_count).slice(0,8);
  let best=null;
  cands.forEach(f=>{const s=simulatePatch([f.finding_id]);s.finding_id=f.finding_id;s.title=f.title;
    if(!best||s.risk_drop_pct>best.risk_drop_pct)best=s;});
  return best;
}

function md(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}

function agentReason(message){
  const m=message.toLowerCase();const trace=[];
  const T=(name,inp)=>trace.push({tool:name,input:inp});

  if(/(one thing|single fix|fix first|biggest impact|most chains|where (do|should) i start|priorit)/.test(m)){
    T('best_single_fix',{});const r=bestSingleFix();
    return {answer:md(`Patch **${r.finding_id}** (${esc(r.title)}) first. It collapses **${r.chains_collapsed} of ${r.chains_before}** attack chains and drops org risk by **${r.risk_drop_pct}%** (from ${r.org_risk_before} to ${r.org_risk_after}). This finding sits at the centre of the most breach paths — a single patch with disproportionate impact.`),trace,sim:r};
  }
  if(/(dangerous|worst|top chain|attack path|breach path)/.test(m)){
    T('get_top_chains',{n:3});
    const lines=CH.slice(0,3).map(c=>`<br><br><strong>${c.chain_id}</strong> (risk ${c.chain_risk}) → ${esc(c.crown_jewel)}:<br>${esc(c.narrative)}`).join('');
    return {answer:md(`Your most dangerous attack paths right now:`)+lines,trace};
  }
  const idMatch=message.match(/[Ff]-\d{5}/g);
  if((m.includes('simulate')||m.includes('patch'))&&idMatch){
    const ids=idMatch.map(x=>x.toUpperCase());T('simulate_patch',{finding_ids:ids});
    const r=simulatePatch(ids);
    return {answer:md(`Patching ${ids.join(', ')} collapses **${r.chains_collapsed}** chains and drops org risk by **${r.risk_drop_pct}%** (${r.org_risk_before} → ${r.org_risk_after}).`),trace,sim:r};
  }
  // asset — pick the asset whose id/name best matches the message (longest token overlap wins)
  let bestAsset=null,bestScore=0;
  const mtokens=m.split(/[\s,.?!]+/).filter(t=>t.length>2);
  for(const aid in ASSETS){
    const a=ASSETS[aid];
    const haystack=(aid+' '+(a.name||'')).toLowerCase();
    let sc=0;
    mtokens.forEach(t=>{ if(haystack.includes(t)) sc+=t.length; });
    if(sc>bestScore){bestScore=sc;bestAsset=aid;}
  }
  if(bestAsset && bestScore>=5){
    const aid=bestAsset, a=ASSETS[aid];
    T('get_asset_risk',{asset_id:aid});
    const fs=F.filter(f=>f.affected_asset_id===aid);const onc=fs.filter(f=>f.chain_count>0);
    let ans=`**${esc(a.name)}** — ${onc.length} of ${fs.length} findings sit on active attack chains.`;
    if(a.is_crown_jewel)ans+=` ⚠️ This is a **CROWN JEWEL** (${esc(a.data_classification)}).`;
    if(onc.length)ans+='<br>Top: '+onc.sort((x,y)=>y.final_score-x.final_score).slice(0,4).map(x=>`${x.finding_id} (${TIER_LABEL[x.priority]})`).join(', ');
    return {answer:md(ans),trace};
  }
  if(/(internet|exposed|facing)/.test(m)){
    T('query_findings',{internet_only:true});
    const r=F.filter(f=>f.network_exposure==='internet'&&f.chain_count>0).sort((a,b)=>b.final_score-a.final_score).slice(0,6);
    return {answer:md('Internet-facing findings on active chains:<br>'+r.map(f=>`• ${f.finding_id} (${TIER_LABEL[f.priority]}) ${esc(f.title)} [CVSS ${f.cvss}, EPSS ${(f.epss*100).toFixed(0)}%]`).join('<br>')),trace};
  }
  if(/(stat|how many|summary|overview|posture|layer)/.test(m)){
    T('get_stats',{dimension:'all'});
    return {answer:md(`**Posture:** ${S.total_findings} findings across ${S.total_assets} assets (${S.crown_jewels} crown jewels), from ${Object.keys(S.by_tool).length} tools spanning ${Object.keys(S.by_layer).length} OSI layers. **${S.total_chains}** cross-layer attack chains found. Org risk score **${BR.headline.org_risk_score}**.<br>Priorities → 🔴 ${S.by_priority.break_chain_critical||0} critical · 🟠 ${S.by_priority.patch_this_week||0} this week · 🟡 ${S.by_priority.patch_this_month||0} this month · ⚪ ${S.by_priority.defer||0} deferred as noise.`),trace};
  }
  if(/brief|report|board|exec/.test(m)){
    T('generate_brief',{scope:'all'});
    return {answer:md(`Generated. Head to the **Exec Brief** tab for the full board-ready one-pager with SEBI CSCRF / ISO 27001 / RBI control mapping. Headline: org risk **${BR.headline.org_risk_score}**, **${S.total_chains}** active chains, recommended first action **${BR.recommended_first_action.finding_id}** (−${BR.recommended_first_action.risk_drop_pct}% risk).`),trace};
  }
  return {answer:md("I can answer things like:<br>• *What's our most dangerous attack path?*<br>• *If I fix one thing, what breaks the most chains?*<br>• *Simulate patching F-00003*<br>• *How exposed is the trading ledger?*<br>• *Give me a posture overview*"),trace:[]};
}

  }catch(e){ const el=document.getElementById('snykStatus'); if(el)el.textContent='Sync failed to start: '+e.message; if(btn){btn.disabled=false;btn.textContent='⟳ Sync Snyk';} }

function handleFiles(files){
  if(HISTORICAL_MODE){ alert('Read-only historical view — return to Live View to upload.'); return; }
  if(!files||!files.length)return;
  document.getElementById('pipeHint').textContent=`${files.length} file(s) queued`;
  document.getElementById('uploadResults').innerHTML='';
  [...files].forEach((f,i)=>setTimeout(()=>processFile(f),i*200));
}

async function processFile(file){
  const fmt=(file.name.split('.').pop()||'').toLowerCase();
  const steps=document.getElementById('pipeSteps');
  const id='pipe-'+Math.random().toString(36).slice(2,8);
  steps.insertAdjacentHTML('beforeend',`
    <div class="pipe-file" id="${id}">
      <div class="pf-head"><span class="pf-name">${esc(file.name)}</span><span class="pf-fmt">${esc(fmt.toUpperCase())}</span></div>
      <div class="pf-steps">
        <div class="pf-step" data-s="extract">① Format extraction</div>
        <div class="pf-step" data-s="normalize">② AI normalization (Role 1)</div>
        <div class="pf-step" data-s="merge">③ Merge + recompute chains</div>
      </div>
      <div class="pf-out"></div>
    </div>`);
  const card=document.getElementById(id);
  const setStep=(s,cls)=>{const el=card.querySelector(`[data-s="${s}"]`);if(el)el.className='pf-step '+cls;};

  if(BACKEND_URL){
    // LIVE
    try{
      setStep('extract','run');
      const fd=new FormData();fd.append('file',file);
      const resp=await fetch(BACKEND_URL+'/api/upload',{method:'POST',body:fd});
      const d=await resp.json();
      setStep('extract','done');setStep('normalize','done');setStep('merge','done');
      renderUploadResult(card,d);
      // Merge is live on the backend now — pull the recomputed engine state so
      // Overview / Priorities / Chains / Graph / Brief reflect this file (and
      // every earlier file this session). Done after rendering the result card.
      if(d.ok){ loadLiveData('upload:'+(file.name||'')); }
    }catch(e){
      setStep('extract','err');
      card.querySelector('.pf-out').innerHTML=`<div class="pf-err">Upload failed: ${esc(e.message)}</div>`;
    }
  } else {
    // DEMO simulation
    await wait(500);setStep('extract','done');
    await wait(800);setStep('normalize','run');
    await wait(900);setStep('normalize','done');
    setStep('merge','run');
    await wait(700);setStep('merge','done');
    renderUploadResult(card,simulateUpload(file.name,fmt));
  }
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

function renderUploadResult(card,d){
  if(!d.ok){card.querySelector('.pf-out').innerHTML=`<div class="pf-err">${esc(d.error||'extraction failed')}</div>`;return;}
  const rev=d.review_queue||[];
  card.querySelector('.pf-out').innerHTML=`
    <div class="pf-summary">
      <span class="pf-stat"><b>${d.extracted}</b> extracted</span>
      <span class="pf-stat ok"><b>${d.auto_accepted!=null?d.auto_accepted:(d.extracted-d.needs_review)}</b> auto-accepted</span>
      <span class="pf-stat warn"><b>${d.needs_review}</b> need review</span>
      <span class="pf-stat ai"><b>${esc(d.extraction_method)}</b></span>
    </div>
    <div class="pf-merge">⚡ Merged into live graph — attack chains <b>${d.merge.chains_before}</b> → <b style="color:var(--crit)">${d.merge.chains_after}</b>${d.merge.uploaded_findings_on_chains&&d.merge.uploaded_findings_on_chains.length?` · ${d.merge.uploaded_findings_on_chains.length} uploaded finding(s) landed on a chain`:''}</div>
    ${rev.length?`<div class="pf-review"><div class="pf-review-h">⚠ Flagged for human review</div>${rev.slice(0,5).map(r=>`<div class="pf-rev-row"><span>${esc(r.finding_id)} · ${esc(r.title.slice(0,46))}</span><span class="pf-conf">conf ${r.confidence}</span><div class="pf-rev-reason">${esc(r.reason)}</div></div>`).join('')}</div>`:''}`;
}

// Demo simulation that mirrors what the real backend returns
function simulateUpload(name,fmt){
  const samples={
    json:{extracted:2,needs_review:0,method:'llm',chains:[11,19],on:['F-U1000','F-U1001'],
      rev:[]},
    csv:{extracted:3,needs_review:1,method:'llm',chains:[19,28],on:['F-U1003','F-U1004'],
      rev:[{finding_id:'F-U1005',title:'Weird login behavior',confidence:0.45,reason:'no severity given; auth_bypass inferred from prose — verify'}]},
    xlsx:{extracted:2,needs_review:0,method:'llm',chains:[28,28],on:[],rev:[]},
    pdf:{extracted:5,needs_review:2,method:'llm',chains:[28,33],on:['F-U1010','F-U1012'],
      rev:[{finding_id:'F-U1011',title:'Possible info disclosure in error page',confidence:0.52,reason:'severity ambiguous in prose; CVSS estimated'},
           {finding_id:'F-U1014',title:'Legacy TLS configuration',confidence:0.58,reason:'asset not clearly named in report — needs mapping'}]},
    xml:{extracted:4,needs_review:1,method:'llm',chains:[33,38],on:['F-U1020'],
      rev:[{finding_id:'F-U1021',title:'Directory listing enabled',confidence:0.55,reason:'asset guessed from hostname pattern'}]},
  };
  const s=samples[fmt]||samples.json;
  return {ok:true,format:fmt,extracted:s.extracted,needs_review:s.rev.length,
    auto_accepted:s.extracted-s.rev.length,extraction_method:s.method+' (simulated)',
    review_queue:s.rev,merge:{chains_before:s.chains[0],chains_after:s.chains[1],uploaded_findings_on_chains:s.on}};
}

  // belt-and-suspenders: refreshViews is already called inside loadLiveData on
  // success, but force one more pass so any view that depends on globals that
  // were swapped by applyData is guaranteed to repaint.
  if(ok){ try{ refreshViews(); }catch(e){} }
  // jump to overview so the user sees the live posture, not whichever tab the
  // historical run was last left on.
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  const ov=document.querySelector('.tab[data-v="overview"]'); if(ov) ov.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const ovv=document.getElementById('v-overview'); if(ovv) ovv.classList.add('active');
  window.scrollTo(0,0);
}
async function runCompare(){
  const f=document.getElementById('cmpFrom').value, t=document.getElementById('cmpTo').value;
  const box=document.getElementById('cmpResult'); box.innerHTML='Comparing…';
  const c=await fetch(`${BACKEND_URL}/api/history/compare?from=${f}&to=${t}`).then(r=>r.json());
  if(!c.enabled||c.error){ box.innerHTML='Comparison unavailable.'; return; }
  const delta=(o,n,pct,inv)=>{const d=n-o;const good=inv?d<0:d>0;const col=d===0?'var(--muted2)':(good?'var(--crit)':'var(--ok)');return `<span style="color:${col};font-weight:700">${o} → ${n} (${pct>0?'+':''}${pct}%)</span>`;};
  box.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
      <div class="stat-card"><div style="font-size:11px;color:var(--muted2)">P1 Findings</div>${delta(c.p1.from,c.p1.to,c.p1.pct_change,true)}</div>
      <div class="stat-card"><div style="font-size:11px;color:var(--muted2)">Attack Chains</div>${delta(c.chains.from,c.chains.to,c.chains.pct_change,true)}</div>
      <div class="stat-card"><div style="font-size:11px;color:var(--muted2)">Risk Score</div>${delta(c.risk.from,c.risk.to,c.risk.pct_change,true)}</div>
      <div class="stat-card"><div style="font-size:11px;color:var(--muted2)">Findings</div><span style="color:var(--ok)">−${c.findings.resolved} resolved</span> · <span style="color:var(--crit)">+${c.findings.new} new</span></div>
    </div>
    <div style="margin-top:12px;font-size:12px">
      <div style="color:var(--ok);font-weight:700;margin-bottom:4px">Most improved assets</div>${(c.most_improved_assets||[]).map(a=>`<span class="chip" style="color:var(--ok)">${esc(a.asset)} ${a.delta}</span>`).join('')||'<span style="color:var(--muted2)">none</span>'}
      <div style="color:var(--crit);font-weight:700;margin:8px 0 4px">Most regressed assets</div>${(c.most_regressed_assets||[]).map(a=>`<span class="chip" style="color:var(--crit)">${esc(a.asset)} +${a.delta}</span>`).join('')||'<span style="color:var(--muted2)">none</span>'}
      <div style="color:var(--crit);font-weight:700;margin:8px 0 4px">Top new attack paths</div>${(c.chains.new_sample||[]).slice(0,6).map(x=>`<div style="font-size:11px;color:var(--muted)">• ${esc(x.objective||'path')} (conf ${Math.round(x.confidence)}) ${(x.products||[]).map(p=>esc(p)).join(' + ')}</div>`).join('')||'<span style="color:var(--muted2)">none</span>'}
    </div>`;
}
function renderTrend(){
  const box=document.getElementById('trendBox'); if(!box) return;
  fetch(BACKEND_URL+'/api/history/trends').then(r=>r.json()).then(d=>{
    const runs=(d.runs||[]); if(!runs.length){ box.innerHTML='no data'; return; }
    const spark=(key,col)=>{const vals=runs.map(r=>r[key]||0);const mx=Math.max(1,...vals);return `<div style="display:flex;align-items:flex-end;gap:2px;height:40px">${vals.map(v=>`<div title="${v}" style="flex:1;background:${col};height:${Math.max(3,v/mx*40)}px;border-radius:1px"></div>`).join('')}</div>`;};
    box.innerHTML=`<div style="font-size:12px;color:var(--muted)">${runs.length} runs · oldest → newest</div>
      <div style="margin-top:8px"><div style="font-size:11px;color:var(--crit)">P1 findings</div>${spark('p1','var(--crit)')}</div>
      <div style="margin-top:8px"><div style="font-size:11px;color:var(--week)">Attack chains</div>${spark('chains','var(--week)')}</div>
      <div style="margin-top:8px"><div style="font-size:11px;color:var(--month)">Risk score</div>${spark('risk','var(--month)')}</div>`;
  });
}

/* Pull the full live engine state (all findings/chains/graph/brief for every
   file uploaded this session) and re-render. Safe to call repeatedly. */
async function loadLiveData(reason){
  if(!BACKEND_URL) return false;
  if(HISTORICAL_MODE && reason!=='exit-history'){ setHistoricalMode(false); }
  const lbl=document.getElementById('refreshLbl');
  const btn=document.getElementById('refreshBtn');
  if(lbl) lbl.textContent='Loading…';
  if(btn) btn.disabled=true;
  try{
    const snap = await fetch(BACKEND_URL+'/api/snapshot',{cache:'no-store'}).then(r=>{
      if(!r.ok) throw new Error('HTTP '+r.status); return r.json();
    });
    applyData(snap);
    refreshViews();
    console.log('VulnIQ: live data loaded'+(reason?' ('+reason+')':'')+
      ' — '+(S.total_findings||0)+' findings, '+(S.total_chains||0)+' chains.');
    if(lbl){ lbl.textContent='✓ '+(S.total_findings||0)+' findings'; setTimeout(()=>{if(lbl)lbl.textContent='Refresh';},2200); }
    if(btn) btn.disabled=false;
    return true;
  }catch(e){
    console.log('VulnIQ: live snapshot unavailable ('+e.message+') — keeping current data. '+
      'Is the backend running with the /api/snapshot endpoint? Restart uvicorn if you upgraded.');
    if(lbl){ lbl.textContent='⚠ offline'; setTimeout(()=>{if(lbl)lbl.textContent='Refresh';},2600); }
    if(btn) btn.disabled=false;
    return false;
  }
}

/* ---- live backend status sync ---- */
async function syncLiveStatus(){
  if(!BACKEND_URL) return;
  try{
    const h = await fetch(BACKEND_URL+'/api/health').then(r=>r.json());
    if(h && h.llm){
      console.log('VulnIQ: live backend connected, LLM active ('+(h.model||'')+')');
    } else {
      console.log('VulnIQ: backend reachable but llm:false - check ANTHROPIC_API_KEY in the uvicorn terminal.');
    }
    // Whether or not the LLM is on, load the real engine state and re-render.
    await loadLiveData('startup');
  }catch(e){
    console.log('VulnIQ: backend not reachable at '+BACKEND_URL+' - running on baked-in snapshot.');
  }
}

shell();
syncLiveStatus();
