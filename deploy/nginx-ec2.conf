# VulnIQ on EC2 — nginx serves the dashboard and reverse-proxies the API on 443.
# Self-signed cert by default (browser warning over the VPN is fine); swap in a
# real internal cert at /etc/nginx/ssl/ to remove the warning.
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/vulniq.crt;
    ssl_certificate_key /etc/nginx/ssl/vulniq.key;

    root /opt/vulniq/frontend;
    index dashboard.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # Snyk sync / LLM calls can be slow
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /dashboard.html;
        add_header Cache-Control "no-store";
    }
}
